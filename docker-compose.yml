services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: locville-app
    ports:
      - "8080:8080"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 8080
    stdin_open: true
    tty: true
